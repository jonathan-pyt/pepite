name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter "@pepite/core" test
      - run: pnpm --filter "@pepite/extension" build
      - run: pnpm --filter "@pepite/extension" build:firefox

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Le tag doit correspondre à la version du package
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./packages/extension/package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG ≠ version $VERSION dans packages/extension/package.json — bump la version avant de taguer."
            exit 1
          fi
      - run: pnpm --filter "@pepite/extension" zip
      - run: pnpm --filter "@pepite/extension" zip:firefox
      - uses: softprops/action-gh-release@v3
        with:
          # *-firefox.zip exclut volontairement le *-sources.zip généré par wxt zip -b firefox
          files: |
            packages/extension/.output/*-chrome.zip
            packages/extension/.output/*-firefox.zip
          generate_release_notes: true
